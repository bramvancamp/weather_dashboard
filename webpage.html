<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard · Berlin · Amsterdam · Copenhagen</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F7F5F0;
      font-family: 'DM Serif Display', Georgia, serif;
      color: #1A1714;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── Layout ── */
    #header {
      background: #fff;
      border-bottom: 1px solid #E2DDD6;
      padding: 24px 40px 0;
      position: sticky; top: 0; z-index: 10;
    }
    #header h1 { font-size: clamp(20px, 3.5vw, 28px); font-weight: 400; margin: 0; }
    #header .sub { font-size: 12px; color: #6B6560; margin-top: 4px; }
    #header .eyebrow { font-size: 11px; letter-spacing: .18em; color: #A39E99; margin-bottom: 5px; }

    /* ── Tab bar ── */
    #tabbar {
      display: flex; align-items: stretch;
      border-bottom: 1px solid #E2DDD6;
      margin-top: 16px;
    }
    .tab-btn {
      padding: 10px 24px; border: none; background: transparent;
      font-size: 14px; color: #A39E99;
      border-bottom: 2px solid transparent;
      transition: all .15s; margin-bottom: -1px;
    }
    .tab-btn.active { color: #1A1714; border-bottom-color: #1A1714; }
    #tabbar .spacer { flex: 1; }

    /* ── Selector pills ── */
    #pills { display: flex; align-items: center; gap: 4px; padding-bottom: 10px; }
    .pill {
      padding: 5px 14px; border-radius: 20px; font-size: 12px;
      border: 1px solid #E2DDD6; background: transparent; color: #6B6560;
      transition: all .15s;
    }
    .pill.active-avg    { background:#1A1714; color:#F7F5F0; border-color:#1A1714; }
    .pill.active-berlin { background:#C0392B; color:#fff; border-color:#C0392B; }
    .pill.active-amsterdam { background:#1A5276; color:#fff; border-color:#1A5276; }
    .pill.active-copenhagen { background:#117A65; color:#fff; border-color:#117A65; }

    /* ── Content ── */
    #content { padding: 24px 40px 48px; }

    /* ── KPI groups ── */
    .kpi-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 0; }
    .kpi-row {
      display: flex; align-items: stretch;
      border: 1px solid #E2DDD6; border-radius: 10px;
      overflow: hidden; background: #fff;
    }
    .kpi-row-label {
      width: 52px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border-right: 1px solid #E2DDD6;
    }
    .kpi-row-label span {
      font-size: 10px; letter-spacing: .14em;
      writing-mode: vertical-rl; text-orientation: mixed;
      transform: rotate(180deg);
    }
    .kpi-card {
      flex: 1; padding: 14px 18px;
      border-right: 1px solid #E2DDD6;
    }
    .kpi-card:last-child { border-right: none; }
    .kpi-label { font-size: 10px; color: #A39E99; letter-spacing: .12em; margin-bottom: 6px; }
    .kpi-value { font-size: 26px; font-weight: 400; line-height: 1.1; }
    .kpi-sub   { font-size: 10px; color: #A39E99; margin-top: 4px; }

    /* ── Chart card ── */
    .chart-card {
      background: #fff; border-radius: 10px; border: 1px solid #E2DDD6;
      padding: 20px 20px 16px; margin-top: 16px;
    }
    .chart-title { font-size: 11px; color: #A39E99; letter-spacing: .12em; margin-bottom: 12px; }
    .chart-wrap  { position: relative; height: 300px; }

    /* ── Source ── */
    .source {
      margin-top: 20px; padding-top: 14px;
      border-top: 1px solid #EDE9E3;
      font-size: 11px; color: #A39E99; line-height: 1.8;
    }
    .source strong { letter-spacing: .08em; margin-right: 4px; }

    /* ── Spinner ── */
    #spinner {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 0; gap: 16px;
    }
    .spin-ring {
      width: 32px; height: 32px;
      border: 3px solid #E2DDD6; border-top-color: #C0392B;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: 13px; color: #A39E99; }


    /* ── Summary table ── */
    .summary-wrap {
      background: #fff; border-radius: 10px; border: 1px solid #E2DDD6;
      overflow: hidden; margin-bottom: 16px;
    }
    .summary-table {
      width: 100%; border-collapse: collapse;
      font-size: 13px;
    }
    .summary-table th {
      padding: 10px 16px; text-align: right;
      font-size: 11px; letter-spacing: .1em; color: #A39E99;
      border-bottom: 1px solid #E2DDD6;
      font-weight: 400; white-space: nowrap;
    }
    .summary-table th:first-child { text-align: left; }
    .summary-table td {
      padding: 13px 16px; text-align: right;
      border-bottom: 1px solid #EDE9E3;
      color: #1A1714; white-space: nowrap;
      font-size: 14px;
    }
    .summary-table td:first-child { text-align: left; font-size: 14px; }
    .summary-table tr:last-child td { border-bottom: none; font-weight: 600; background: #F7F5F0; }
    .summary-table .section-header td {
      background: #F7F5F0; font-size: 10px; letter-spacing: .1em;
      color: #A39E99; padding: 8px 16px; border-bottom: 1px solid #E2DDD6;
      text-align: left;
    }
    .delta-warm { color: #B03A2E; }
    .delta-cool { color: #1A5276; }
    .delta-zero { color: #A39E99; }
    .city-flag  { margin-right: 6px; }
    /* ── Error ── */
    #error-msg { padding: 40px; color: #B03A2E; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="eyebrow">WEATHER INTELLIGENCE</div>
  <h1>Berlin · Amsterdam · Copenhagen</h1>
  <div class="sub" id="date-sub">Loading…</div>

  <div id="tabbar">
    <button class="tab-btn active" data-tab="summary" onclick="switchTab('summary')">Summary</button>
    <button class="tab-btn" data-tab="forecast" onclick="switchTab('forecast')">Last 7d + Forecast</button>
    <button class="tab-btn" data-tab="yoy" onclick="switchTab('yoy')" id="yoy-tab-btn">YoY Comparison</button>
    <div class="spacer"></div>
    <div id="pills">
      <button class="pill active-avg" data-sel="avg"        onclick="switchSelector('avg')">Avg</button>
      <button class="pill"            data-sel="berlin"     onclick="switchSelector('berlin')">🇩🇪 Berlin</button>
      <button class="pill"            data-sel="amsterdam"  onclick="switchSelector('amsterdam')">🇳🇱 Amsterdam</button>
      <button class="pill"            data-sel="copenhagen" onclick="switchSelector('copenhagen')">🇩🇰 Copenhagen</button>
    </div>
  </div>
</div>

<div id="content">
  <div id="spinner"><div class="spin-ring"></div><div class="spin-label">Fetching live weather data…</div></div>
  <div id="error-msg" style="display:none"></div>
  <div id="summary-panel" style="display:none"></div>
  <div id="dashboard" style="display:none">
    <div class="kpi-group" id="kpi-group"></div>
    <div class="chart-card">
      <div class="chart-title" id="chart-title"></div>
      <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
    </div>
    <div class="source" id="source-text"></div>
  </div>
</div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────────
const CITIES = [
  { id:"berlin",     label:"Berlin",     flag:"🇩🇪", lat:52.52,  lon:13.405 },
  { id:"amsterdam",  label:"Amsterdam",  flag:"🇳🇱", lat:52.374, lon:4.899  },
  { id:"copenhagen", label:"Copenhagen", flag:"🇩🇰", lat:55.676, lon:12.568 },
];

const C = {
  high:"#C0392B", low:"#1A5276",
  warmer:"#B03A2E", cooler:"#1A5276",
  muted:"#A39E99", border:"#E2DDD6",
};

// ─── State ─────────────────────────────────────────────────────────────────────
let currentTab      = "summary";
let currentSelector = "avg";
let weatherData     = null;   // { cityId: { trend:[], yoy:{thisYear:[], lastYear:[]} } }
let dates           = null;
let chartInstance   = null;

// ─── Date helpers ──────────────────────────────────────────────────────────────
function fmt(d) { return d.toISOString().slice(0,10); }

function dayLabel(s) {
  const d = new Date(s + "T12:00:00Z");
  return d.toLocaleDateString("en-GB",{ month:"short", day:"numeric" });
}

function buildDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  const past7Start = new Date(today); past7Start.setDate(today.getDate()-7);
  const past7End   = new Date(today); past7End.setDate(today.getDate()-1);
  const fcst7End   = new Date(today); fcst7End.setDate(today.getDate()+6);
  const ly25Start  = new Date(past7Start); ly25Start.setFullYear(ly25Start.getFullYear()-1);
  const ly25End    = new Date(past7End);   ly25End.setFullYear(ly25End.getFullYear()-1);
  return { today, past7Start, past7End, fcst7End, ly25Start, ly25End };
}

// ─── Open-Meteo fetch ──────────────────────────────────────────────────────────
// Uses forecast API with past_days for recent data (no archive lag).
// Archive API is only used for last-year YoY data.
async function fetchForecastWithPast(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FBerlin&past_days=7&forecast_days=7`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
  return (await r.json()).daily;
}

async function fetchArchive(lat, lon, startDate, endDate) {
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min&timezone=Europe%2FBerlin&start_date=${startDate}&end_date=${endDate}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} for ${url}`);
  return (await r.json()).daily;
}

async function loadAllData() {
  dates = buildDates();
  const { past7Start, past7End, ly25Start, ly25End, today } = dates;
  const todayStr = fmt(today);
  const result = {};
  await Promise.all(CITIES.map(async city => {
    const [combined, lastYr] = await Promise.all([
      fetchForecastWithPast(city.lat, city.lon),
      fetchArchive(city.lat, city.lon, fmt(ly25Start), fmt(ly25End)),
    ]);
    const round = v => Math.round(v * 10) / 10;
    result[city.id] = {
      trend: combined.time.map((t, i) => ({
        day:  dayLabel(t),
        hi:   round(combined.temperature_2m_max[i]),
        lo:   round(combined.temperature_2m_min[i]),
        type: t < todayStr ? "actual" : "forecast",
      })),
      yoy: {
        thisYear: combined.time
          .filter(t => t >= fmt(past7Start) && t < todayStr)
          .map((t, i) => {
            const offset = combined.time.indexOf(t);
            return { day: dayLabel(t), hi: round(combined.temperature_2m_max[offset]), lo: round(combined.temperature_2m_min[offset]) };
          }),
        lastYear: lastYr.time.map((t, i) => ({
          day: dayLabel(t),
          hi:  round(lastYr.temperature_2m_max[i]),
          lo:  round(lastYr.temperature_2m_min[i]),
        })),
      },
    };
  }));
  return result;
}

// ─── Helpers ───────────────────────────────────────────────────────────────────
const avg  = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : 0;
const avgR = arr => parseFloat(avg(arr).toFixed(1));
const sign = v => parseFloat(v)>0 ? `+${v}` : `${v}`;

function cityIds() {
  return currentSelector === "avg" ? CITIES.map(c=>c.id) : [currentSelector];
}

function getKpis() {
  const ids = cityIds();
  const actuals   = ids.flatMap(id => weatherData[id].trend.filter(d=>d.type==="actual"));
  const forecasts = ids.flatMap(id => weatherData[id].trend.filter(d=>d.type==="forecast"));
  const fActHi  = avgR(actuals.map(d=>d.hi));
  const fActLo  = avgR(actuals.map(d=>d.lo));
  const fFcstHi = avgR(forecasts.map(d=>d.hi));
  const fFcstLo = avgR(forecasts.map(d=>d.lo));
  const tyHis   = ids.flatMap(id=>weatherData[id].yoy.thisYear.map(d=>d.hi));
  const tyLos   = ids.flatMap(id=>weatherData[id].yoy.thisYear.map(d=>d.lo));
  const lyHis   = ids.flatMap(id=>weatherData[id].yoy.lastYear.map(d=>d.hi));
  const lyLos   = ids.flatMap(id=>weatherData[id].yoy.lastYear.map(d=>d.lo));
  const yHiTy=avgR(tyHis), yLoTy=avgR(tyLos), yHiLy=avgR(lyHis), yLoLy=avgR(lyLos);
  return {
    fActHi, fActLo, fFcstHi, fFcstLo,
    fDHi: (fFcstHi-fActHi).toFixed(1), fDLo: (fFcstLo-fActLo).toFixed(1),
    yHiTy, yLoTy, yHiLy, yLoLy,
    yDHi: (yHiTy-yHiLy).toFixed(1), yDLo: (yLoTy-yLoLy).toFixed(1),
  };
}

// ─── KPI rendering ─────────────────────────────────────────────────────────────
function renderKpis(rows) {
  const el = document.getElementById("kpi-group");
  el.innerHTML = rows.map(row => `
    <div class="kpi-row">
      <div class="kpi-row-label" style="background:${row.color}12">
        <span style="color:${row.color}">${row.label}</span>
      </div>
      ${row.cards.map((card,i) => `
        <div class="kpi-card">
          <div class="kpi-label">${card.label}</div>
          <div class="kpi-value" style="color:${card.deltaColor || row.color}">${card.value}</div>
          ${card.sub ? `<div class="kpi-sub">${card.sub}</div>` : ""}
        </div>
      `).join("")}
    </div>
  `).join("");
}

// ─── Chart rendering ───────────────────────────────────────────────────────────
function renderChart(labels, datasets, titleText, todayLabel) {
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  document.getElementById("chart-title").textContent = titleText;

  const ctx = document.getElementById("main-chart").getContext("2d");

  // Draw a subtle "today" vertical line via plugin
  const todayLinePlugin = {
    id: "todayLine",
    afterDraw(chart) {
      if (!todayLabel) return;
      const idx = chart.data.labels.indexOf(todayLabel);
      if (idx < 0) return;
      const meta = chart.getDatasetMeta(0);
      if (!meta.data[idx]) return;
      const x = meta.data[idx].x;
      const { top, bottom } = chart.chartArea;
      const ctx2 = chart.ctx;
      ctx2.save();
      ctx2.setLineDash([4,4]);
      ctx2.strokeStyle = "#E2DDD6";
      ctx2.lineWidth = 1.5;
      ctx2.beginPath(); ctx2.moveTo(x, top); ctx2.lineTo(x, bottom); ctx2.stroke();
      ctx2.setLineDash([]);
      ctx2.fillStyle = "#A39E99";
      ctx2.font = "10px 'DM Serif Display', serif";
      ctx2.textAlign = "left";
      ctx2.fillText("Today →", x+4, top+12);
      ctx2.restore();
    }
  };

  chartInstance = new Chart(ctx, {
    type: "line",
    plugins: [todayLinePlugin],
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:"index", intersect:false },
      plugins: {
        legend: {
          labels: {
            font:{ family:"'DM Serif Display', serif", size:12 },
            color:"#6B6560", boxWidth:24, boxHeight:2, useBorderRadius:true, borderRadius:1,
          }
        },
        tooltip: {
          backgroundColor:"#fff", borderColor:"#E2DDD6", borderWidth:1,
          titleColor:"#6B6560", bodyColor:"#1A1714",
          titleFont:{ family:"'DM Serif Display', serif", size:12 },
          bodyFont:{ family:"'DM Serif Display', serif", size:13 },
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}°C` },
          padding:10,
        },
      },
      scales: {
        x: {
          grid:{ color:"#EDE9E3" },
          ticks:{ font:{ family:"'DM Serif Display', serif", size:11 }, color:"#A39E99" },
          border:{ display:false },
        },
        y: {
          grid:{ color:"#EDE9E3" },
          ticks:{ font:{ family:"'DM Serif Display', serif", size:11 }, color:"#A39E99",
                  callback: v => `${v}°` },
          border:{ display:false },
        },
      },
      elements: { point:{ radius:4, hoverRadius:6 }, line:{ tension:0.3 } },
    },
  });
}

// ─── Render forecast tab ────────────────────────────────────────────────────────
function renderForecast() {
  const ids = cityIds();
  const kpi = getKpis();
  const { past7Start, past7End, today, fcst7End } = dates;
  const actRange  = `${dayLabel(fmt(past7Start))} – ${dayLabel(fmt(past7End))}`;
  const fcstRange = `${dayLabel(fmt(today))} – ${dayLabel(fmt(fcst7End))}`;
  const dHiColor  = parseFloat(kpi.fDHi)<0 ? C.cooler : C.warmer;
  const dLoColor  = parseFloat(kpi.fDLo)<0 ? C.cooler : C.warmer;

  renderKpis([
    { label:"HIGH", color:C.high, cards:[
      { label:"ACTUAL",   value:`${kpi.fActHi}°C`,      sub:actRange  },
      { label:"FORECAST", value:`${kpi.fFcstHi}°C`,     sub:fcstRange },
      { label:"Δ",        value:`${sign(kpi.fDHi)}°C`,  sub:"fcst vs actual", deltaColor:dHiColor },
    ]},
    { label:"LOW", color:C.low, cards:[
      { label:"ACTUAL",   value:`${kpi.fActLo}°C`,      sub:actRange  },
      { label:"FORECAST", value:`${kpi.fFcstLo}°C`,     sub:fcstRange },
      { label:"Δ",        value:`${sign(kpi.fDLo)}°C`,  sub:"fcst vs actual", deltaColor:dLoColor },
    ]},
  ]);

  // Build chart data — all 14 days, split by actual vs forecast
  const allDays = weatherData[ids[0]].trend.map(d=>d.day);
  const hiActual   = allDays.map((_,i)=>{ const s=weatherData[ids[0]].trend[i]; return s.type==="actual"   ? avgR(ids.map(id=>weatherData[id].trend[i].hi)) : null; });
  const loActual   = allDays.map((_,i)=>{ const s=weatherData[ids[0]].trend[i]; return s.type==="actual"   ? avgR(ids.map(id=>weatherData[id].trend[i].lo)) : null; });
  const hiForecast = allDays.map((_,i)=>{ const s=weatherData[ids[0]].trend[i]; return s.type==="forecast" ? avgR(ids.map(id=>weatherData[id].trend[i].hi)) : null; });
  const loForecast = allDays.map((_,i)=>{ const s=weatherData[ids[0]].trend[i]; return s.type==="forecast" ? avgR(ids.map(id=>weatherData[id].trend[i].lo)) : null; });

  const scopeLabel = currentSelector==="avg" ? "REGIONAL AVG" : currentSelector.toUpperCase();
  renderChart(allDays, [
    { label:"High (actual)",   data:hiActual,   borderColor:C.high, backgroundColor:C.high+"22", borderWidth:2.5, borderDash:[], pointBackgroundColor:C.high },
    { label:"Low (actual)",    data:loActual,   borderColor:C.low,  backgroundColor:C.low+"22",  borderWidth:2.5, borderDash:[], pointBackgroundColor:C.low  },
    { label:"High (forecast)", data:hiForecast, borderColor:C.high, backgroundColor:"transparent", borderWidth:2, borderDash:[6,4], pointBackgroundColor:"transparent", pointBorderColor:C.high },
    { label:"Low (forecast)",  data:loForecast, borderColor:C.low,  backgroundColor:"transparent", borderWidth:2, borderDash:[6,4], pointBackgroundColor:"transparent", pointBorderColor:C.low  },
  ], `${scopeLabel} · TEMPERATURE °C · SOLID = ACTUAL · DASHED = FORECAST`, dayLabel(fmt(today)));

  const loc = currentSelector==="avg" ? "Berlin, Amsterdam & Copenhagen (unweighted avg)" : CITIES.find(c=>c.id===currentSelector).label;
  document.getElementById("source-text").innerHTML = `<strong>SOURCE</strong>Open-Meteo forecast API (past_days). Location: ${loc}. Actuals: ${actRange}. Forecast: ${fcstRange}. Forecast values subject to change.`;
}

// ─── Render YoY tab ─────────────────────────────────────────────────────────────
function renderYoY() {
  const ids = cityIds();
  const kpi = getKpis();
  const { past7Start, past7End, ly25Start } = dates;
  const actRange = `${dayLabel(fmt(past7Start))} – ${dayLabel(fmt(past7End))}`;
  const tyYear = past7Start.getFullYear();
  const lyYear = ly25Start.getFullYear();
  const dHiColor = parseFloat(kpi.yDHi)<0 ? C.cooler : C.warmer;
  const dLoColor = parseFloat(kpi.yDLo)<0 ? C.cooler : C.warmer;

  renderKpis([
    { label:"HIGH", color:C.high, cards:[
      { label:String(tyYear), value:`${kpi.yHiTy}°C`, sub:actRange },
      { label:String(lyYear), value:`${kpi.yHiLy}°C`, sub:actRange },
      { label:"Δ", value:`${sign(kpi.yDHi)}°C`, sub:`${tyYear} vs ${lyYear}`, deltaColor:dHiColor },
    ]},
    { label:"LOW", color:C.low, cards:[
      { label:String(tyYear), value:`${kpi.yLoTy}°C`, sub:actRange },
      { label:String(lyYear), value:`${kpi.yLoLy}°C`, sub:actRange },
      { label:"Δ", value:`${sign(kpi.yDLo)}°C`, sub:`${tyYear} vs ${lyYear}`, deltaColor:dLoColor },
    ]},
  ]);

  const days  = weatherData[ids[0]].yoy.thisYear.map(d=>d.day);
  const tyHi  = days.map((_,i) => avgR(ids.map(id=>weatherData[id].yoy.thisYear[i].hi)));
  const tyLo  = days.map((_,i) => avgR(ids.map(id=>weatherData[id].yoy.thisYear[i].lo)));
  const lyHi  = days.map((_,i) => avgR(ids.map(id=>weatherData[id].yoy.lastYear[i]?.hi ?? 0)));
  const lyLo  = days.map((_,i) => avgR(ids.map(id=>weatherData[id].yoy.lastYear[i]?.lo ?? 0)));

  const scopeLabel = currentSelector==="avg" ? "REGIONAL AVG" : currentSelector.toUpperCase();
  renderChart(days, [
    { label:`${tyYear} High`, data:tyHi, borderColor:C.high, backgroundColor:C.high+"22", borderWidth:2.5, borderDash:[], pointBackgroundColor:C.high },
    { label:`${lyYear} High`, data:lyHi, borderColor:C.high, backgroundColor:"transparent", borderWidth:1.5, borderDash:[5,3], pointBackgroundColor:"transparent", pointBorderColor:C.high, pointRadius:3 },
    { label:`${tyYear} Low`,  data:tyLo, borderColor:C.low,  backgroundColor:C.low+"22",  borderWidth:2.5, borderDash:[], pointBackgroundColor:C.low  },
    { label:`${lyYear} Low`,  data:lyLo, borderColor:C.low,  backgroundColor:"transparent", borderWidth:1.5, borderDash:[5,3], pointBackgroundColor:"transparent", pointBorderColor:C.low,  pointRadius:3 },
  ], `${scopeLabel} · TEMPERATURE °C · SOLID = ${tyYear} · DASHED = ${lyYear}`, null);

  const loc = currentSelector==="avg" ? "Berlin, Amsterdam & Copenhagen (unweighted avg)" : CITIES.find(c=>c.id===currentSelector).label;
  document.getElementById("source-text").innerHTML = `<strong>SOURCE</strong>Open-Meteo forecast API (past_days) for current year; archive API for ${lyYear}. Location: ${loc}. Period: last 7 days vs same 7 days in ${lyYear}.`;
}


// ─── Render Summary tab ────────────────────────────────────────────────────────
function renderSummary() {
  // Hide chart-based dashboard, show summary panel
  document.getElementById("dashboard").style.display      = "none";
  document.getElementById("summary-panel").style.display  = "block";

  const { past7Start, past7End, today, fcst7End, ly25Start } = dates;
  const actRange  = `${dayLabel(fmt(past7Start))} – ${dayLabel(fmt(past7End))}`;
  const fcstRange = `${dayLabel(fmt(today))} – ${dayLabel(fmt(fcst7End))}`;
  const tyYear = past7Start.getFullYear();
  const lyYear = ly25Start.getFullYear();

  // Build per-city stats
  function cityStats(id) {
    const d = weatherData[id];
    const lyHis  = d.yoy.lastYear.map(x=>x.hi),  lyLos  = d.yoy.lastYear.map(x=>x.lo);
    const tyHis  = d.yoy.thisYear.map(x=>x.hi),  tyLos  = d.yoy.thisYear.map(x=>x.lo);
    const fcHis  = d.trend.filter(x=>x.type==="forecast").map(x=>x.hi);
    const fcLos  = d.trend.filter(x=>x.type==="forecast").map(x=>x.lo);
    const lyHi=avgR(lyHis), tyHi=avgR(tyHis), fcHi=avgR(fcHis);
    const lyLo=avgR(lyLos), tyLo=avgR(tyLos), fcLo=avgR(fcLos);
    return {
      hiLY:lyHi, hiTY:tyHi, hiFc:fcHi,
      dHiYoY:(tyHi-lyHi).toFixed(1), dHiFc:(fcHi-tyHi).toFixed(1),
      loLY:lyLo, loTY:tyLo, loFc:fcLo,
      dLoYoY:(tyLo-lyLo).toFixed(1), dLoFc:(fcLo-tyLo).toFixed(1),
    };
  }

  const rows = CITIES.map(c => ({ ...c, s: cityStats(c.id) }));

  // Avg row
  function avgStat(key) { return avgR(rows.map(r=>r.s[key])); }
  const avgRow = {
    hiLY: avgStat("hiLY"), hiTY: avgStat("hiTY"), hiFc: avgStat("hiFc"),
    dHiYoY: (avgStat("hiTY")-avgStat("hiLY")).toFixed(1),
    dHiFc:  (avgStat("hiFc")-avgStat("hiTY")).toFixed(1),
    loLY: avgStat("loLY"), loTY: avgStat("loTY"), loFc: avgStat("loFc"),
    dLoYoY: (avgStat("loTY")-avgStat("loLY")).toFixed(1),
    dLoFc:  (avgStat("loFc")-avgStat("loTY")).toFixed(1),
  };

  function dc(v) {
    const n = parseFloat(v);
    if (n > 0)  return `<span class="delta-warm">+${v}°</span>`;
    if (n < 0)  return `<span class="delta-cool">${v}°</span>`;
    return `<span class="delta-zero">${v}°</span>`;
  }
  function temp(v) { return `${v}°C`; }

  function tableRow(label, s, isAvg=false) {
    const style = isAvg ? "" : "";
    return `<tr>
      <td>${label}</td>
      <td>${temp(s.hiLY)}</td><td>${temp(s.hiTY)}</td><td>${dc(s.dHiYoY)}</td>
      <td>${temp(s.hiFc)}</td><td>${dc(s.dHiFc)}</td>
      <td>${temp(s.loLY)}</td><td>${temp(s.loTY)}</td><td>${dc(s.dLoYoY)}</td>
      <td>${temp(s.loFc)}</td><td>${dc(s.dLoFc)}</td>
    </tr>`;
  }

  const html = `
    <div class="summary-wrap">
      <table class="summary-table">
        <thead>
          <tr>
            <th rowspan="2" style="text-align:left; border-right:1px solid #E2DDD6">CITY</th>
            <th colspan="5" style="border-bottom:none; border-right:1px solid #E2DDD6; color:#C0392B; letter-spacing:.1em">HIGH TEMP</th>
            <th colspan="5" style="border-bottom:none; color:#1A5276; letter-spacing:.1em">LOW TEMP</th>
          </tr>
          <tr>
            <th>${lyYear} avg</th>
            <th>${tyYear} avg</th>
            <th>Δ YoY</th>
            <th>Forecast avg</th>
            <th style="border-right:1px solid #E2DDD6">Δ Fcst</th>
            <th>${lyYear} avg</th>
            <th>${tyYear} avg</th>
            <th>Δ YoY</th>
            <th>Forecast avg</th>
            <th>Δ Fcst</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => tableRow(`<span class="city-flag">${r.flag}</span>${r.label}`, r.s)).join("")}
          ${tableRow("Avg", avgRow, true)}
        </tbody>
      </table>
    </div>
    <div class="source">
      <strong>SOURCE</strong>Open-Meteo forecast API (past_days) for actuals & forecast; archive API for ${lyYear} YoY data.
      Last 7d actuals: ${actRange}. Forecast: ${fcstRange}.
      YoY comparison: same 7 days in ${lyYear}. All values are 7-day averages in °C.
    </div>
  `;
  document.getElementById("summary-panel").innerHTML = html;
}

// ─── Routing ───────────────────────────────────────────────────────────────────
function render() {
  if (!weatherData) return;
  // Show/hide the right panels
  const isSum = currentTab === "summary";
  document.getElementById("dashboard").style.display     = isSum ? "none" : "block";
  document.getElementById("summary-panel").style.display = isSum ? "block" : "none";
  // Hide/show city pills on summary (it shows all cities)
  document.getElementById("pills").style.visibility = isSum ? "hidden" : "visible";
  if (currentTab === "forecast") renderForecast();
  else if (currentTab === "yoy") renderYoY();
  else renderSummary();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  render();
}

function switchSelector(sel) {
  currentSelector = sel;
  document.querySelectorAll(".pill").forEach(b => {
    b.className = "pill" + (b.dataset.sel===sel ? ` active-${sel}` : "");
  });
  render();
}

// ─── Boot ──────────────────────────────────────────────────────────────────────
(async function boot() {
  try {
    weatherData = await loadAllData();
    const { past7Start, past7End, fcst7End, ly25Start } = dates;
    const tyYear = past7Start.getFullYear();
    const lyYear = ly25Start.getFullYear();
    document.getElementById("date-sub").textContent =
      `${dayLabel(fmt(past7Start))} – ${dayLabel(fmt(past7End))} + 7-day forecast · vs. ${lyYear}`;
    document.getElementById("yoy-tab-btn").textContent = `${lyYear} vs ${tyYear}`;
    document.getElementById("spinner").style.display   = "none";
    document.getElementById("dashboard").style.display = "block";
    render();
  } catch(e) {
    document.getElementById("spinner").style.display  = "none";
    const err = document.getElementById("error-msg");
    err.style.display = "block";
    err.textContent   = `Failed to load weather data: ${e.message}`;
  }
})();
</script>
</body>
</html>
